name: Build Holiday Calendars

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - holidayAPI.json
      - generate-ics.js
      - .github/workflows/build.yml

permissions:
  contents: write

env:
  UPSTREAM_HOLIDAY_API_URL: https://raw.githubusercontent.com/lanceliao/china-holiday-calender/master/holidayAPI.json

jobs:
  build-calendars:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check upstream holiday data
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          temp_file="$(mktemp)"
          trap 'rm -f "$temp_file"' EXIT
          curl -fsSL "$UPSTREAM_HOLIDAY_API_URL" -o "$temp_file"

          if cmp -s "$temp_file" holidayAPI.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv "$temp_file" holidayAPI.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate ICS files
        if: steps.upstream.outputs.changed == 'true' || github.event_name != 'schedule'
        run: node generate-ics.js

      - name: Commit generated calendars
        if: steps.upstream.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync upstream holiday calendars"
          file_pattern: holidayAPI.json holidayCal.ics holidayCal-HO.ics holidayCal-CO.ics
