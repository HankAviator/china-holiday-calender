name: Build Holiday Calendars

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - holidayAPI.json
      - generate-ics.js
      - .github/workflows/build.yml

permissions:
  contents: write

env:
  UPSTREAM_HOLIDAY_API_URL: https://raw.githubusercontent.com/lanceliao/china-holiday-calender/master/holidayAPI.json

jobs:
  build-calendars:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync holiday data from upstream
        run: curl -fsSL "$UPSTREAM_HOLIDAY_API_URL" -o holidayAPI.json

      - name: Generate ICS files
        run: node generate-ics.js

      - name: Commit generated calendars
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync upstream holiday calendars"
          file_pattern: holidayAPI.json holidayCal.ics holidayCal-HO.ics holidayCal-CO.ics
